<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>メンバー｜Bashi.com — 一橋コンピュータ研究会</title>
<meta name="description" content="Bashi.com（一橋コンピュータ研究会）のメンバー紹介。学年・文理を問わず、50名以上のメンバーがそれぞれの興味を持ち寄って活動しています。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main id="bb-root" style="background:#FFFFFF;color:#10171C;font-family:'IBM Plex Sans JP',sans-serif;position:relative;overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased">

  <!-- NAV -->
  <header style="position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(255,255,255,.85);border-bottom:1px solid #ECEFF1">
    <nav style="max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px">
      <a href="index.html" style="display:flex;align-items:center;gap:11px;text-decoration:none">
        <img src="uploads/SCARE_LOGO_Opacity_BLACK.png" alt="Bashi.com" style="height:28px;width:auto;display:block">
        <span style="font-weight:700;font-size:16px;letter-spacing:-.02em;color:#10171C">Bashi<span style="color:#0E6B74">.com</span></span>
      </a>
      <a href="index.html" class="bb-back" style="display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500;color:#3D474E;text-decoration:none"><span class="bb-arrow">←</span> ホームに戻る</a>
    </nav>
  </header>

  <!-- HEAD -->
  <section style="max-width:1180px;margin:0 auto;padding:clamp(46px,7vw,84px) 24px clamp(24px,3vw,36px)">
    <div data-rv style="opacity:0;transform:translateY(14px);transition:opacity .7s,transform .7s;font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.16em;color:#11757F;text-transform:uppercase;margin-bottom:20px">Members — メンバー</div>
    <h1 data-rv data-rv-delay="80" style="opacity:0;transform:translateY(18px);transition:opacity .8s,transform .8s;margin:0 0 22px;font-weight:700;font-size:clamp(32px,5.5vw,60px);line-height:1.12;letter-spacing:-.02em">つくる人たち。</h1>
    <p data-rv data-rv-delay="160" style="opacity:0;transform:translateY(18px);transition:opacity .8s,transform .8s;margin:0;max-width:620px;font-size:16px;line-height:2;color:#56616A">学年も、文理も、得意なこともさまざま。50名以上のメンバーが、それぞれの興味を持ち寄って活動しています。<span style="color:#8A949B">（掲載は一例です。プロフィールは差し替えできます。）</span></p>
  </section>

  <!-- LEADERSHIP -->
  <section id="bb-leadership" style="max-width:1180px;margin:0 auto;padding:0 24px clamp(28px,4vw,40px)">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:#9AA4AB;text-transform:uppercase;margin-bottom:16px">代表・副代表</div>
    <div id="bb-lead-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px"></div>
  </section>

  <!-- COUNT -->
  <section style="max-width:1180px;margin:0 auto;padding:0 24px clamp(20px,3vw,28px)">
    <div style="display:flex;justify-content:flex-end;padding:14px 0;border-bottom:1px solid #EDF0F2">
      <span id="bb-count" style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#8A949B"></span>
    </div>
  </section>

  <!-- GRID -->
  <section style="max-width:1180px;margin:0 auto;padding:0 24px clamp(48px,7vw,88px)">
    <div id="bb-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
      <!-- members are rendered from members.json by members.js -->
    </div>
  </section>

  <!-- CTA -->
  <section style="background:#0E2F35;color:#EAF3F4;position:relative;overflow:hidden">
    <div style="position:absolute;top:-25%;right:-6%;width:42vw;height:42vw;max-width:500px;max-height:500px;background:radial-gradient(circle,rgba(98,196,203,.2),transparent 65%);filter:blur(10px)"></div>
    <div style="position:relative;max-width:1180px;margin:0 auto;padding:clamp(52px,8vw,92px) 24px;text-align:center">
      <div data-rv style="opacity:0;transition:opacity .8s;font-weight:700;font-size:22px;letter-spacing:-.02em;color:#fff;margin-bottom:24px">Bashi<span style="color:#7FD9DE">.com</span></div>
      <h2 data-rv data-rv-delay="60" style="opacity:0;transform:translateY(18px);transition:opacity .8s,transform .8s;margin:0 0 16px;font-weight:700;font-size:clamp(26px,4vw,44px);color:#fff;letter-spacing:-.01em">次は、あなたの番。</h2>
      <p data-rv data-rv-delay="120" style="opacity:0;transform:translateY(18px);transition:opacity .8s,transform .8s;margin:0 0 30px;font-size:15.5px;line-height:1.85;color:#B6CACD">学年・文理は問いません。気になったら、まずは話を聞きに来てください。</p>
      <a data-rv data-rv-delay="180" href="index.html#join" class="bb-btn-primary" style="opacity:0;transform:translateY(18px);transition:opacity .8s,transform .8s;display:inline-block;font-size:15px;font-weight:600;color:#08222a;background:#62C4CB;text-decoration:none;padding:15px 32px;border-radius:9px;box-shadow:0 10px 26px rgba(98,196,203,.3)">入会について</a>
    </div>
    <footer style="border-top:1px solid rgba(255,255,255,.1)">
      <div style="max-width:1180px;margin:0 auto;padding:28px 24px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:12px">
          <img src="uploads/SCARE_LOGO_Opacity_BLACK.png" class="logo-invert" alt="B" style="height:24px;width:auto">
          <span style="font-size:11px;color:#7E9296">一橋コンピュータ研究会</span>
        </div>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#7E9296">© 2026 Bashi.com</span>
      </div>
    </footer>
  </section>

</main>
<script src="app.js"></script>
<script src="members.js"></script>
</body>
</html>
